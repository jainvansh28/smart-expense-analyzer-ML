services:
  - type: web
    name: expense-analyzer-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: DATABASE_URL
        sync: false   # Set manually in Render dashboard
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false   # Set to your Vercel URL, e.g. https://your-app.vercel.app
      - key: LOG_LEVEL
        value: INFO
