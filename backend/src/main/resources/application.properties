# Server Configuration
server.port=${PORT:8080}
spring.application.name=expense-analyzer

# Database Configuration
# Supports Railway DATABASE_URL (jdbc:mysql://...) or individual vars
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/expense_analyzer?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool settings for Render (free tier sleeps)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Email Configuration — disabled in demo mode (OTP removed)
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=${EMAIL_USER:}
# spring.mail.password=${EMAIL_PASS:}
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# ML Service Configuration (optional - graceful fallback if unavailable)
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}
ml.prediction.service.url=${ML_PREDICTION_URL:http://localhost:8001}
ml.anomaly.service.url=${ML_ANOMALY_URL:http://localhost:8002}
ml.budget.service.url=${ML_BUDGET_URL:http://localhost:8003}

# CORS Configuration — comma-separated list of allowed origins
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Logging — reduce noise in production
logging.level.com.expenseanalyzer=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Actuator — expose health endpoint for Render health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never


management.health.mail.enabled=false
