# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
spring.application.name=expense-analyzer

# ── Database ──────────────────────────────────────────────────────────────────
# Local defaults work out-of-the-box; override with env vars in production.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/expense_analyzer}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:expenseuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── Mail ──────────────────────────────────────────────────────────────────────
# Mail starter removed from pom.xml — no SMTP config needed.

# ── ML Services (optional, graceful fallback) ─────────────────────────────────
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}
ml.prediction.service.url=${ML_PREDICTION_URL:http://localhost:8001}
ml.anomaly.service.url=${ML_ANOMALY_URL:http://localhost:8002}
ml.budget.service.url=${ML_BUDGET_URL:http://localhost:8003}

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.expenseanalyzer=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
